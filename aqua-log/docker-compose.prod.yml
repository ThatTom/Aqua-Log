services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: aqua_log
      POSTGRES_USER: ${DB_USER:-aqua_log}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-aqua_log}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/thattom/aqua-log-backend:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER:-aqua_log}:${DB_PASSWORD:-changeme}@db/aqua_log
      SPECIES_DATA_PATH: /app/species-data
    volumes:
      - species_data:/app/species-data
    ports:
      - "8000:8000"

  frontend:
    image: ghcr.io/thattom/aqua-log-frontend:latest
    restart: unless-stopped
    depends_on: [backend]
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  species_data:
